server:
  port: 8080

spring:
  application:
    name: event-gateway
  datasource:
    url: jdbc:h2:mem:gatewaydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: false

account-service:
  base-url: ${ACCOUNT_SERVICE_BASE_URL:http://localhost:8081}

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always
